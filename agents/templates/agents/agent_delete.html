{% extends 'base.html' %}
{% block content %}

        <a href = "{% url 'agents:agents-list' %}">Agents list</a>
        <hr>
        <h1>Are you sure delete an agent: {{ agent.username }}</h1>

        </form>
    </div>
{% endblock content %}
