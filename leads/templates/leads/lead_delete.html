{% extends 'base.html' %}
{% block content %}
    <div class="container">
        <a href = "{% url 'leads:leads-list' %}">Leads list</a>
        <hr>
        <h1>Are you sure delete a lead: {{ lead.first_name }} {{ lead.last_name }}</h1>
        <form action="." method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <a href = "{% url 'leads:leads-list' %}" class="btn btn-primary">NO, GO Back</a>
            <button type="submit" class="btn btn-danger">Yes, sure</button>
        </form>
    </div>
{% endblock content %}
