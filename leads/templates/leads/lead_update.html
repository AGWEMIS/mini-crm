{% extends 'base.html' %}
{% block content %}
    <div class="container">
        <a href = "{% url 'leads:leads-list' %}">Leads list</a>
        <hr>
        <h1>Update a lead {{ lead.first_name }} {{ lead.last_name }}</h1>
        <form action="." method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Save</button>
        </form>
    </div>
{% endblock content %}
