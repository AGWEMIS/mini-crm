{% extends 'base.html' %}
{% block content %}
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1>Leads List</h1>
            <a href="{% url 'leads:lead-create' %}">
                Leads Create
            </a>
        </div>
        <hr>
        <ul class="list-group">
            {% for lead in leads %}
            <li class="list-group-item"><a href="{% url 'leads:lead-detail' lead.pk %}">{{ lead.first_name}} {{lead.last_name}}</a></li>
            {% endfor %}
        </Ul>
    </div>
{% endblock content %}
