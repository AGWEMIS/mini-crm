{% extends 'base.html' %}
{% block content %}
    <a href = "{% url 'leads:lead-create' %}">Leads Create</a>
    <hr>
    <h1>Leads List</h1>
    <ol>
        {% for lead in leads %}
        <div class="lead">
            <a href="{% url 'leads:lead-detail' lead.pk %}">{{ lead.first_name}} {{lead.last_name}}</a> Age: {{ lead.age }}
        </div>
        {% endfor %}
    </ol>
{% endblock content %}
